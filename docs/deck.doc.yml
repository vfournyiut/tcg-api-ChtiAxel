tags:
  - name: Decks
    description: Gestion des decks.
paths:
  /api/decks:
    post:
      tags:
        - Decks
      summary: Creer un deck
      description: Cree un deck pour l'utilisateur authentifie.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeckCreateRequest'
            example:
              name: Starter Deck
              cards: [1, 4, 7, 10, 13, 16, 19, 25, 52, 133]
      responses:
        '201':
          description: Deck cree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deck'
        '400':
          description: Donnees invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Le deck doit contenir exactement 10 cartes
        '401':
          description: Token manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Token manquant
        '500':
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/decks/mine:
    get:
      tags:
        - Decks
      summary: Lister mes decks
      description: Retourne les decks de l'utilisateur authentifie.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des decks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Deck'
        '401':
          description: Token manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Token manquant
        '500':
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/decks/{id}:
    get:
      tags:
        - Decks
      summary: Obtenir un deck
      description: Retourne un deck par son identifiant.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 12
      responses:
        '200':
          description: Deck trouve
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deck'
        '401':
          description: Token manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Token manquant
        '404':
          description: Deck introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Deck introuvable
        '500':
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags:
        - Decks
      summary: Modifier un deck
      description: Met a jour le nom et/ou les cartes d'un deck.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 12
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeckUpdateRequest'
            example:
              name: Updated Deck Name
              cards: [2, 5, 8, 11, 14, 17, 20, 26, 53, 134]
      responses:
        '200':
          description: Deck mis a jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deck'
        '400':
          description: Donnees invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Aucune donnee a modifier
        '401':
          description: Token manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Token manquant
        '404':
          description: Deck introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Deck introuvable
        '500':
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - Decks
      summary: Supprimer un deck
      description: Supprime un deck par son identifiant.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 12
      responses:
        '200':
          description: Deck supprime
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Deck supprime
        '401':
          description: Token manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Token manquant
        '404':
          description: Deck introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Deck introuvable
        '500':
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
